services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  runner:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: n8n-runner
    restart: unless-stopped
    working_dir: /files/hh-auto-clicker
    environment:
      RUNNER_HOST: 0.0.0.0
      RUNNER_PORT: 3001
      RUNNER_AUTH_TOKEN: ${RUNNER_AUTH_TOKEN}
      PROJECT_ROOT: /files/hh-auto-clicker
    command: ["node", "n8n/runner/server.mjs"]
    volumes:
      - ../:/files/hh-auto-clicker

  n8n:
    image: n8nio/n8n:2.14.2
    container_name: n8n
    restart: unless-stopped
    working_dir: /files/hh-auto-clicker
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_DIAGNOSTICS_ENABLED: "false"
      AUTO_MODE: ${AUTO_MODE}
      CHAT_ADAPTER: ${CHAT_ADAPTER}
      HH_CHAT_URL: ${HH_CHAT_URL}
      COOKIES_PATH: ${COOKIES_PATH}
      PLAYWRIGHT_HEADED: ${PLAYWRIGHT_HEADED}
      PLAYWRIGHT_SLOWMO_MS: ${PLAYWRIGHT_SLOWMO_MS}
      CHAT_POLL_URL: ${CHAT_POLL_URL}
      CHAT_SEND_URL: ${CHAT_SEND_URL}
      CHAT_API_TOKEN: ${CHAT_API_TOKEN}
      AI_PROVIDER: ${AI_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      RESUME_FILE: ${RESUME_FILE}
      CANDIDATE_NAME: ${CANDIDATE_NAME}
      CONTACT_TELEGRAM: ${CONTACT_TELEGRAM}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT}
      RESPONSE_TEMPLATE: ${RESPONSE_TEMPLATE}
      MAX_REPLIES_PER_HOUR: ${MAX_REPLIES_PER_HOUR}
      MIN_SECONDS_BETWEEN_REPLIES: ${MIN_SECONDS_BETWEEN_REPLIES}
      MAX_RETRIES: ${MAX_RETRIES}
      BASE_BACKOFF_MS: ${BASE_BACKOFF_MS}
      POLL_LIMIT: ${POLL_LIMIT}
      AUTO_STATE_FILE: ${AUTO_STATE_FILE}
      AUTO_LOG_FILE: ${AUTO_LOG_FILE}
      REPORT_DIR: ${REPORT_DIR}
      DRAFT_QUEUE_FILE: ${DRAFT_QUEUE_FILE}
      MOCK_INBOX_FILE: ${MOCK_INBOX_FILE}
      MOCK_OUTBOX_FILE: ${MOCK_OUTBOX_FILE}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
      RUNNER_AUTH_TOKEN: ${RUNNER_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      runner:
        condition: service_started
    volumes:
      - ../:/files/hh-auto-clicker
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
